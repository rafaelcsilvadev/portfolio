<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Purple to Cyan Gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BF5AF2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5AC8FA;stop-opacity:1" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="#BF5AF2" flood-opacity="0.3" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Left Bracket -->
  <path d="M 32 25 L 28 25 C 24 25 22 27 22 31 L 22 46 L 18 50 L 22 54 L 22 69 C 22 73 24 75 28 75 L 32 75" 
        fill="none" 
        stroke="url(#neonGradient)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />

  <!-- Right Bracket -->
  <path d="M 68 25 L 72 25 C 76 25 78 27 78 31 L 78 46 L 82 50 L 78 54 L 78 69 C 78 73 76 75 72 75 L 68 75" 
        fill="none" 
        stroke="url(#neonGradient)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />

  <!-- Lightning Bolt (Beveled) -->
  <g filter="url(#glow)">
    <!-- Right/Main Half (Brighter Gradient) -->
    <path d="M 50 20 L 62 20 L 48 50 L 60 50 L 50 80 L 50 50 L 50 20" 
          fill="url(#neonGradient)" />
    <!-- Left Half (Darker Shade for Bevel) -->
    <path d="M 50 20 L 50 50 L 50 80 L 40 80 L 52 50 L 40 50 L 50 20" 
          fill="#9D4EDD" 
          opacity="0.6" />
  </g>
</svg>
